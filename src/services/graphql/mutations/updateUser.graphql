mutation UpdateUser($user: UpdateUserInput!) {
  updateUser(user: $user) {
    id
    created_at
    email
    is_verified
    role
    department_name
    position_name
    profile {
      id
      created_at
      first_name
      last_name
      full_name
      avatar
    }
    department {
      id
      name
    }
    position {
      id
      name
    }
  }
}
