query Cv($cvId: ID!) {
  cv(cvId: $cvId) {
    id
    name
    education
    description
    user {
      id
      email
      profile {
        first_name
        last_name
        full_name
      }
      position {
        name
      }
    }
    languages {
      name
      proficiency
    }
    skills {
      name
      mastery
      categoryId
    }
    projects {
      id
      name
      internal_name
      description
      domain
      start_date
      end_date
      environment
      roles
      responsibilities
      project {
        id
      }
    }
  }
}
