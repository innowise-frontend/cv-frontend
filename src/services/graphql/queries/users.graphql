query Users($params: SearchPaginationInput!) {
  users(params: $params) {
    items {
      id

      department {
        id
        name
      }
      position {
        id
        name
      }
      email
      role
      profile {
        last_name
        first_name
        avatar
      }
    }
    total
    page
    limit
    total_pages
  }
}
