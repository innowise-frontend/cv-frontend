query Cvs($params: SearchPaginationInput!) {
  cvs(params: $params) {
    items {
      id
      name
      education
      description
      user {
        id
        email
      }
    }
    total
    page
    limit
    total_pages
  }
}

query Cv($cvId: ID!) {
  cv(cvId: $cvId) {
    id
    name
    education
    description
    user {
      id
      email
    }
    skills {
      name
      mastery
      categoryId
    }
  }
}
