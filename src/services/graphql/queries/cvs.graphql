query Cvs($params: SearchPaginationInput!) {
  cvs(params: $params) {
    items {
      id
      name
      education
      description
      user {
        id
        email
      }
    }
    total
    page
    limit
    total_pages
  }
}

query Cv($cvId: ID!) {
  cv(cvId: $cvId) {
    id
    name
    education
    description
    user {
      id
      email
      position_name
      profile {
        first_name
        last_name
        full_name
      }
      position {
        name
      }
    }
    languages {
      name
      proficiency
    }
    skills {
      name
      mastery
      categoryId
    }
    projects {
      id
      name
      internal_name
      description
      domain
      start_date
      end_date
      environment
      roles
      responsibilities
      project {
        id
      }
    }
  }
}
